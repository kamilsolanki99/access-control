name: Check User Expiry

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-expiry:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run expiry check
        run: python scripts/check_expiry.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add users.json
          git diff --staged --quiet || git commit -m "auto: update expired user status"
          git push
